services:
  postgres:
    image: postgres:16
    container_name: shop-loadtest-postgres
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
    ports:
      - "5433:5432"
    volumes:
      - shop-loadtest-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: shop-loadtest-redis
    ports:
      - "6379:6379"

volumes:
  shop-loadtest-postgres-data:
